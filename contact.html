<section class="container my-5">
  <h2>Contactez-nous</h2>
  <div class="row">
    <div class="col-md-6">
      <form>
        <div class="mb-3">
          <label for="nom">Nom</label>
          <input type="text" id="nom" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" class="form-control" required>

        </div>
        <div class="mb-3">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="sujet">Sujet</label>
          <select id="sujet" class="form-control">
            <option value="">Sélectionnez un sujet</option>
            <option value="emploi">Demande d'emploi</option>
            <option value="information">Demande d'information</option>
            <option value="support">Support technique</option>
            <option value="partnership">Partenariat</option>
            <option value="autre">Autre</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="message">Message</label>
          <textarea id="message" class="form-control" required></textarea>
        </div>
        <button class="btn btn-primary">Envoyer</button>
      
    </div>
    <div class="col-md-6">
      <h4>Nos coordonnées</h4>
      <p><strong>Email :</strong> contact@afritalent.com</p>
      <p><strong>Téléphone :</strong> +33 1 23 45 67 89</p>
      <p><strong>Adresse :</strong>123 rue de la Paix, paris, france</p>
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3857.844444444444!2d-17.444444444444445!3d14.716666666666667!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xda88e9c9c9c9c9c9%3A0x9c9c9c9c9c9c9c9c!2sDakar%2C%20S%C3%A9n%C3%A9gal!5e0!3m2!1sfr!2sfr!4v1630000000000!5m2!1sfr!2sfr" frameborder="0" width="500" height="500"></iframe>                                                                                                                                                                                                                                   
    </div>
</form>
