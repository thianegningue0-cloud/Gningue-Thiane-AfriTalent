<section class="container py-5">
        <h2 class="text-center mb-5">Contactez-nous</h2>
        <div class="row" g-4>
          <div class="col-md-6">
         <div class="card shadow border-0 h-100">
          <div class="card-body p-4 p-lg-5">
            <h3 class="mb-4">Envoyez un message</h3>

      <form>
        <div class="row">
          <div class="col-md-6 mb-3">
          <label for="nom">Nom</label>
          <input type="text" id="nom" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" class="form-control" required>
        </div>
        </div>
        <div class="mb-3">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="sujet">Sujet</label>
          <select id="sujet" class="form-select">
            <option value="">Sélectionnez un sujet</option>
            <option value="emploi">Demande d'emploi</option>
            <option value="information">Demande d'information</option>
            <option value="support">Support technique</option>
            <option value="partnership">Partenariat</option>
            <option value="autre">Autre</option>
          </select>
        </div>
        <div class="mb-4">
          <label for="message">Message</label>
          <textarea id="message" class="form-control" required></textarea>
        </div>
        <button class="btn btn-primary w-100">Envoyer</button>
      </form>
    </div>
    </div>
     </div>
    <div class="col-md-6">
      <div class="card shadow border-0 h-100">
      <div class="card-body p-4 p-lg-5">
      <h4 class="mb-4">Nos coordonnées</h4>
      <p class="mb-3"><strong>Email :</strong> contact@afritalent.com</p>
      <p class="mb-3"><strong>Téléphone :</strong> +221 33 123 45 67 </p>
